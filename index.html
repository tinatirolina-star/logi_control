<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>LogiControl Diamond — ERP Logístico Enterprise</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['"Plus Jakarta Sans"','system-ui','sans-serif']},colors:{brand:{50:'#effefb',100:'#c8fff3',200:'#90ffe7',300:'#51f7d8',400:'#1de4c3',500:'#0bc9ab',600:'#0d9488',700:'#0f766e',800:'#115e59',900:'#134e4a'},navy:{800:'#111827',900:'#0a0f1e',950:'#060a14'}}}}}</script>
<style>
:root{--sw:260px;--hh:56px;--glass:rgba(255,255,255,.72);--glass-border:rgba(255,255,255,.35);--glass-shadow:0 8px 32px rgba(0,0,0,.06)}
*{-webkit-tap-highlight-color:transparent;box-sizing:border-box;scrollbar-width:thin;scrollbar-color:rgba(148,163,184,.35) transparent}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(148,163,184,.35);border-radius:3px}
.dark ::-webkit-scrollbar-thumb{background:rgba(71,85,105,.5)}
body{font-family:'Plus Jakarta Sans',sans-serif;overflow:hidden;margin:0;background:#f0f4f8;color:#0f172a;height:100vh}
@supports(height:100dvh){body{height:100dvh}}
.dark body,.dark{background:#0a0f1e;color:#e2e8f0}
.sidebar{width:var(--sw);background:linear-gradient(180deg,#0f172a 0%,#060a14 100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;margin:1px 10px;border-radius:12px;color:#94a3b8;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;border:none;background:none;width:calc(100% - 20px);text-align:left}
.nav-item:hover{background:rgba(148,163,184,.08);color:#e2e8f0}.nav-item.active{background:rgba(11,201,171,.12);color:#1de4c3;font-weight:700}
.nav-item .badge{margin-left:auto;background:#ef4444;color:#fff;font-size:9px;padding:2px 7px;border-radius:20px;font-weight:800;min-width:18px;text-align:center;line-height:1.3}
.glass{background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--glass-border);border-radius:16px;box-shadow:var(--glass-shadow);transition:all .25s}
.glass:hover{box-shadow:0 12px 40px rgba(0,0,0,.08)}
.dark .glass{background:rgba(15,23,42,.65);border-color:rgba(51,65,85,.4);box-shadow:0 8px 32px rgba(0,0,0,.25)}
.card{background:#fff;border-radius:16px;border:1px solid #e2e8f0;transition:all .25s}.dark .card{background:#1e293b;border-color:#334155}
.card:hover{box-shadow:0 8px 24px rgba(0,0,0,.06)}.dark .card:hover{box-shadow:0 8px 24px rgba(0,0,0,.3)}
.kpi-card{position:relative;overflow:hidden;border-radius:16px;padding:18px 20px;border:1px solid rgba(226,232,240,.6);background:linear-gradient(135deg,rgba(255,255,255,.85),rgba(255,255,255,.6));backdrop-filter:blur(12px)}
.dark .kpi-card{background:linear-gradient(135deg,rgba(30,41,59,.7),rgba(15,23,42,.7));border-color:rgba(51,65,85,.5)}
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;border:none;outline:none;min-height:44px;letter-spacing:-.01em}
.btn-p{background:linear-gradient(135deg,#0d9488,#0bc9ab);color:#fff;box-shadow:0 4px 14px rgba(13,148,136,.25)}.btn-p:hover{box-shadow:0 6px 20px rgba(13,148,136,.35);transform:translateY(-1px)}
.btn-s{background:#e2e8f0;color:#334155}.btn-s:hover{background:#cbd5e1}.dark .btn-s{background:#334155;color:#e2e8f0}.dark .btn-s:hover{background:#475569}
.btn-d{background:linear-gradient(135deg,#ef4444,#f87171);color:#fff;box-shadow:0 4px 14px rgba(239,68,68,.25)}
.btn-g{background:transparent;color:#64748b;border:1px solid #e2e8f0}.btn-g:hover{background:#f8fafc;border-color:#cbd5e1}.dark .btn-g{color:#94a3b8;border-color:#334155}.dark .btn-g:hover{background:#1e293b}
.btn-sm{padding:7px 14px;font-size:12px;min-height:36px;border-radius:10px}
.fi{width:100%;padding:10px 14px;border-radius:12px;border:1.5px solid #e2e8f0;background:#fff;font-size:16px;font-family:inherit;outline:none;transition:all .2s;min-height:44px}
.fi:focus{border-color:#0d9488;box-shadow:0 0 0 3px rgba(13,148,136,.12)}.dark .fi{background:#0f172a;border-color:#334155;color:#e2e8f0}
.tab-b{padding:9px 18px;font-size:13px;font-weight:500;color:#64748b;border:none;background:none;cursor:pointer;border-bottom:2.5px solid transparent;transition:all .2s;min-height:42px}
.tab-b:hover{color:#0f172a}.dark .tab-b:hover{color:#e2e8f0}.tab-b.active{color:#0d9488;border-bottom-color:#0d9488;font-weight:700}
.cli{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;cursor:pointer;transition:all .15s;min-height:44px}
.cli:hover{background:#f8fafc}.dark .cli:hover{background:rgba(30,41,59,.5)}.cli.chk{opacity:.5}.cli.chk .ct{text-decoration:line-through}
.cb{width:24px;height:24px;border-radius:8px;border:2px solid #cbd5e1;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}.dark .cb{border-color:#475569}
.chk .cb{background:linear-gradient(135deg,#0d9488,#0bc9ab);border-color:transparent;color:#fff;box-shadow:0 2px 8px rgba(13,148,136,.3)}
.sp{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(6px);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .3s}
.mo.show{opacity:1;pointer-events:all}
.mb{background:#fff;border-radius:20px;width:100%;max-width:720px;max-height:90vh;overflow-y:auto;transform:translateY(20px) scale(.97);transition:transform .35s cubic-bezier(.4,0,.2,1);box-shadow:0 24px 48px rgba(0,0,0,.15)}
.dark .mb{background:#1e293b;box-shadow:0 24px 48px rgba(0,0,0,.5)}.mo.show .mb{transform:translateY(0) scale(1)}
.toast{padding:14px 20px;border-radius:14px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:10px;margin-bottom:8px;animation:slideIn .35s cubic-bezier(.4,0,.2,1);box-shadow:0 8px 24px rgba(0,0,0,.12);min-width:280px}
@keyframes slideIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fin{animation:fadeUp .4s ease both}.fin1{animation-delay:.06s}.fin2{animation-delay:.12s}.fin3{animation-delay:.18s}.fin4{animation-delay:.24s}
.ab{display:flex;align-items:flex-start;gap:12px;padding:14px 18px;border-radius:14px;font-size:12px;font-weight:500;border:1px solid}
.aw{background:#fef3c7;border-color:#fbbf24;color:#92400e}.dark .aw{background:rgba(251,191,36,.07);border-color:rgba(251,191,36,.25);color:#fbbf24}
.ae{background:#fee2e2;border-color:#f87171;color:#991b1b}.dark .ae{background:rgba(248,113,113,.07);border-color:rgba(248,113,113,.25);color:#f87171}
.ai{background:#dbeafe;border-color:#60a5fa;color:#1e40af}.dark .ai{background:rgba(96,165,250,.07);border-color:rgba(96,165,250,.25);color:#60a5fa}
.as{background:#d1fae5;border-color:#34d399;color:#065f46}.dark .as{background:rgba(52,211,153,.07);border-color:rgba(52,211,153,.25);color:#34d399}
.pb{height:6px;border-radius:4px;background:#e2e8f0;overflow:hidden}.dark .pb{background:#334155}
.pf{height:100%;border-radius:4px;background:linear-gradient(90deg,#0d9488,#1de4c3);transition:width .6s ease}
.sg{border:1px solid #e2e8f0;border-radius:14px;overflow:auto;font-size:12px}.dark .sg{border-color:#334155}
.sg table{width:100%;border-collapse:collapse}
.sg th,.sg td{padding:8px 10px;border:1px solid #f1f5f9;text-align:center;min-width:60px;white-space:nowrap}.dark .sg th,.dark .sg td{border-color:#1e293b}
.sg th{background:#f8fafc;font-weight:700;position:sticky;top:0;z-index:2;font-size:11px;text-transform:uppercase;color:#475569}.dark .sg th{background:#0f172a;color:#94a3b8}
.sd-wrap{position:relative}.sd-input{width:100%;padding:8px 12px;border-radius:12px;border:1.5px solid #e2e8f0;background:#fff;font-size:14px;font-family:inherit;outline:none;min-height:38px;transition:all .2s}
.sd-input:focus{border-color:#0d9488;box-shadow:0 0 0 3px rgba(13,148,136,.12)}.dark .sd-input{background:#0f172a;border-color:#334155;color:#e2e8f0}
.sd-list{position:absolute;top:100%;left:0;right:0;z-index:20;background:#fff;border:1.5px solid #e2e8f0;border-top:none;border-radius:0 0 12px 12px;max-height:220px;overflow-y:auto;display:none;box-shadow:0 12px 28px rgba(0,0,0,.1)}
.dark .sd-list{background:#1e293b;border-color:#334155}.sd-list.open{display:block}
.sd-opt{padding:10px 12px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:8px;transition:background .1s;border-bottom:1px solid #f8fafc}
.dark .sd-opt{border-color:rgba(51,65,85,.3)}.sd-opt:hover{background:#f0fdfa}.dark .sd-opt:hover{background:rgba(13,148,136,.06)}
.agenda-card{border-left:4px solid;border-radius:14px;padding:14px 18px;margin-bottom:8px;transition:all .2s;background:#fff;border:1px solid #e2e8f0;border-left-width:4px}
.dark .agenda-card{background:#1e293b;border-color:#334155;border-left-width:4px}
.agenda-card:hover{transform:translateX(3px);box-shadow:0 4px 16px rgba(0,0,0,.06)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:#e2e8f0;border-radius:14px;overflow:hidden}.dark .cal-grid{background:#334155}
.cal-head{padding:10px 4px;background:#f8fafc;text-align:center;font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase}.dark .cal-head{background:#0f172a;color:#94a3b8}
.cal-day{background:#fff;padding:8px;min-height:80px;cursor:pointer;transition:background .15s;position:relative}.dark .cal-day{background:#1e293b}
.cal-day:hover{background:#f8fafc}.dark .cal-day:hover{background:#334155}
.cal-day.today{background:#f0fdfa}.dark .cal-day.today{background:rgba(13,148,136,.08)}
.cal-day.today .cal-num{background:#0d9488;color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center}
.cal-day.other{opacity:.35}.cal-num{font-size:12px;font-weight:600;margin-bottom:4px}
.cal-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin:1px}
.es{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;color:#94a3b8}.es i{font-size:42px;margin-bottom:16px;opacity:.3}
.unsaved{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600}
.notif-dot{width:8px;height:8px;border-radius:50%;background:#ef4444;position:absolute;top:-2px;right:-2px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.tr{transition:background .15s}.tr:hover{background:#f8fafc}.dark .tr:hover{background:rgba(30,41,59,.5)}
.stock-tbl{width:100%;border-collapse:separate;border-spacing:0;font-size:12px}
.stock-tbl th{background:#f8fafc;padding:10px 12px;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:#64748b;border-bottom:2px solid #e2e8f0;position:sticky;top:0;z-index:2;text-align:left}.dark .stock-tbl th{background:#0f172a;color:#94a3b8;border-color:#334155}
.stock-tbl td{padding:8px 12px;border-bottom:1px solid #f1f5f9}.dark .stock-tbl td{border-color:#1e293b}
.close-banner{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;padding:14px 20px;border-radius:14px;display:flex;align-items:center;gap:12px;margin-bottom:16px;box-shadow:0 4px 20px rgba(245,158,11,.3)}
.kanban-col{flex:1;min-width:220px;border-radius:16px;padding:12px;min-height:300px}
.kanban-card{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:8px;border:1px solid #e2e8f0;cursor:pointer;transition:all .2s;font-size:12px}
.dark .kanban-card{background:#1e293b;border-color:#334155}
.kanban-card:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.08)}
.line-row{display:flex;gap:8px;align-items:center;padding:10px 12px;border-radius:12px;background:#f8fafc;margin-bottom:6px;border:1px solid #e2e8f0}.dark .line-row{background:#0f172a;border-color:#334155}
@media(max-width:1024px){:root{--sw:0px}.sidebar{transform:translateX(-100%);width:260px}.sidebar.open{transform:translateX(0);z-index:40;position:fixed;height:100vh}}
@supports(height:100dvh){body,#app,#app>main,.sidebar,.sidebar.open{height:100dvh}}
</style>
</head>
<body>
<div id="app" class="flex" style="height:100vh">
<div id="sidebar-overlay" class="hidden fixed inset-0 bg-black/40 z-20 lg:hidden" onclick="document.getElementById('sidebar').classList.remove('open');this.classList.add('hidden')"></div>
<aside id="sidebar" class="sidebar fixed flex flex-col text-white z-30" style="height:100vh">
<div class="p-5 border-b border-white/5">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-2xl bg-gradient-to-br from-emerald-400 via-teal-500 to-cyan-500 flex items-center justify-center shadow-lg shadow-teal-500/30"><i class="fas fa-cubes text-sm"></i></div>
<div><h1 class="text-[14px] font-extrabold tracking-tight leading-tight">LogiControl</h1><p class="text-[10px] text-teal-400/70 font-medium">Diamond Enterprise v5.0</p></div>
</div>
</div>
<nav class="flex-1 py-3 overflow-y-auto" id="nav-menu">
<div class="px-5 mb-1.5 text-[9px] text-slate-500 uppercase tracking-[.15em] font-bold">Principal</div>
<button class="nav-item active" data-view="dashboard"><i class="fas fa-chart-line w-5 text-center"></i>Dashboard</button>
<button class="nav-item" data-view="agenda"><i class="fas fa-calendar-check w-5 text-center"></i>Agenda<span class="badge" id="agenda-badge" style="display:none">0</span></button>
<button class="nav-item" data-view="orders"><i class="fas fa-box w-5 text-center"></i>Pedidos<span class="badge" id="orders-badge">0</span></button>
<div class="px-5 mt-5 mb-1.5 text-[9px] text-slate-500 uppercase tracking-[.15em] font-bold">Operaciones</div>
<button class="nav-item" data-view="stock"><i class="fas fa-warehouse w-5 text-center"></i>Stock</button>
<button class="nav-item" data-view="loads"><i class="fas fa-truck w-5 text-center"></i>Cargas</button>
<button class="nav-item" data-view="incidents"><i class="fas fa-triangle-exclamation w-5 text-center"></i>Incidencias<span class="badge" id="inc-badge" style="display:none">0</span></button>
<button class="nav-item" data-view="reports"><i class="fas fa-chart-bar w-5 text-center"></i>Informes</button>
<div class="px-5 mt-5 mb-1.5 text-[9px] text-slate-500 uppercase tracking-[.15em] font-bold">Gestión</div>
<button class="nav-item" data-view="archive"><i class="fas fa-archive w-5 text-center"></i>Archivo</button>
</nav>
<div class="p-4 border-t border-white/5 text-[10px] text-slate-600 px-5">
<div class="flex items-center gap-2"><div class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></div>Valentina Deumal</div>
</div>
</aside>
<main class="flex-1 flex flex-col" style="margin-left:var(--sw);height:100vh">
<header class="bg-white/70 dark:bg-slate-900/70 backdrop-blur-xl border-b border-slate-200/50 dark:border-slate-700/50 px-5 flex items-center justify-between z-20 flex-shrink-0" style="height:var(--hh)">
<div class="flex items-center gap-3">
<button class="hidden max-lg:flex w-10 h-10 items-center justify-center rounded-xl text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700" onclick="var sb=document.getElementById('sidebar'),ov=document.getElementById('sidebar-overlay');sb.classList.toggle('open');ov.classList.toggle('hidden')"><i class="fas fa-bars"></i></button>
<div><h2 id="pg-t" class="text-[15px] font-extrabold tracking-tight">Dashboard</h2><p id="pg-s" class="text-[11px] text-slate-500 dark:text-slate-400 font-medium">Panel ejecutivo premium</p></div>
</div>
<div class="flex items-center gap-2">
<div class="relative"><input type="text" id="gs" placeholder="Buscar..." class="fi text-sm !min-h-[36px] !pl-9 !w-40 !rounded-xl !text-[13px]"><i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[11px]"></i></div>
<span id="save-ind" class="unsaved text-emerald-500" style="display:none"><i class="fas fa-check-circle text-[10px]"></i><span>Guardado</span></span>
<button onclick="App.manualSave()" class="btn btn-p btn-sm" title="Guardar"><i class="fas fa-save"></i><span class="max-sm:hidden">Guardar</span></button>
<button onclick="App.showOrderForm()" class="btn btn-sm" style="background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff"><i class="fas fa-plus"></i><span class="max-sm:hidden">Pedido</span></button>
</div>
</header>
<div id="content" class="flex-1 overflow-y-auto p-5" style="scroll-behavior:smooth"></div>
</main>
</div>
<div id="mo" class="mo" onclick="if(event.target===this)App.closeModal()"><div class="mb" id="mb"></div></div>
<div id="tc" class="fixed top-4 right-4 z-[200]" style="max-width:360px"></div>

<script>
(function(){if(window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches)document.documentElement.classList.add('dark');window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',function(e){e.matches?document.documentElement.classList.add('dark'):document.documentElement.classList.remove('dark')})})();

var DB={
db:null,NAME:'LogiControlDB',VER:3,
init:function(){var self=this;return new Promise(function(resolve,reject){
  try{var req=indexedDB.open(self.NAME,self.VER);
  req.onupgradeneeded=function(e){var db=e.target.result;
    if(!db.objectStoreNames.contains('appState'))db.createObjectStore('appState',{keyPath:'key'});
    if(!db.objectStoreNames.contains('monthlyArchive'))db.createObjectStore('monthlyArchive',{keyPath:'monthKey'});
    if(!db.objectStoreNames.contains('auditLog')){var s=db.createObjectStore('auditLog',{keyPath:'id',autoIncrement:true});s.createIndex('timestamp','timestamp')}
  };
  req.onsuccess=function(e){self.db=e.target.result;resolve()};
  req.onerror=function(e){reject(e.target.error)};
  }catch(e){reject(e)}
})},
save:function(key,value){var self=this;if(!self.db)return Promise.resolve();return new Promise(function(resolve,reject){var tx=self.db.transaction('appState','readwrite');tx.objectStore('appState').put({key:key,value:value,updatedAt:new Date().toISOString()});tx.oncomplete=function(){resolve()};tx.onerror=function(e){reject(e.target.error)}})},
loadAll:function(){var self=this;if(!self.db)return Promise.resolve({});return new Promise(function(resolve,reject){var tx=self.db.transaction('appState','readonly');var req=tx.objectStore('appState').getAll();req.onsuccess=function(){var result={};req.result.forEach(function(item){result[item.key]=item.value});resolve(result)};req.onerror=function(e){reject(e.target.error)}})},
saveAll:function(obj){var self=this;if(!self.db)return Promise.resolve();return new Promise(function(resolve,reject){var tx=self.db.transaction('appState','readwrite');var store=tx.objectStore('appState');var keys=Object.keys(obj);for(var i=0;i<keys.length;i++){store.put({key:keys[i],value:obj[keys[i]],updatedAt:new Date().toISOString()})}tx.oncomplete=function(){resolve()};tx.onerror=function(e){reject(e.target.error)}})},
audit:function(action,entity,entityId,details){if(!this.db)return;try{var tx=this.db.transaction('auditLog','readwrite');tx.objectStore('auditLog').add({timestamp:new Date().toISOString(),action:action,entity:entity,entityId:entityId||'',details:details||'',user:'Valentina Deumal'})}catch(e){}},
archiveMonth:function(monthKey,data){var self=this;if(!self.db)return Promise.resolve();return new Promise(function(resolve,reject){var tx=self.db.transaction('monthlyArchive','readwrite');tx.objectStore('monthlyArchive').put({monthKey:monthKey,data:data,archivedAt:new Date().toISOString(),archivedBy:'Valentina Deumal'});tx.oncomplete=function(){resolve()};tx.onerror=function(e){reject(e.target.error)}})},
getArchive:function(monthKey){var self=this;if(!self.db)return Promise.resolve(null);return new Promise(function(resolve,reject){var tx=self.db.transaction('monthlyArchive','readonly');var req=tx.objectStore('monthlyArchive').get(monthKey);req.onsuccess=function(){resolve(req.result||null)};req.onerror=function(e){reject(e.target.error)}})},
getAllArchives:function(){var self=this;if(!self.db)return Promise.resolve([]);return new Promise(function(resolve,reject){var tx=self.db.transaction('monthlyArchive','readonly');var req=tx.objectStore('monthlyArchive').getAll();req.onsuccess=function(){resolve(req.result||[])};req.onerror=function(e){reject(e.target.error)}})},

/* ==================== PRODUCT STOCK HELPERS ==================== */
getProductStock:function(productCode){
  var sd=this.state.stockData;var result={general:0,calidad:0,playa:0,total:0,lots:[]};
  sd.forEach(function(s){
    if(s.productCode!==productCode)return;
    var isPlaya=s.locationCode==='0000000';
    var isCal=s.warehouse==='Almacen CALIDAD';
    if(isPlaya){result.playa+=s.stock}
    else if(isCal){result.calidad+=s.stock}
    else{result.general+=s.stock}
    if(s.lotCode&&result.lots.indexOf(s.lotCode)===-1)result.lots.push(s.lotCode);
  });
  result.total=result.general+result.calidad+result.playa;
  return result;
},
calcOrderStockStatus:function(order){
  if(!order.lines||!order.lines.length)return order.stockStatus||'total';
  var worst='total';var self=this;
  order.lines.forEach(function(ln){
    var ps=self.getProductStock(ln.ref);
    ln.stockGeneral=ps.general;ln.stockCalidad=ps.calidad;ln.stockPlaya=ps.playa;ln.stockTotal=ps.total;
    if(ps.total===0&&ln.qty>0){ln.lineStatus='sin_stock';worst='sin_stock'}
    else if(ps.general>=ln.qty){ln.lineStatus='total'}
    else if(ps.total>=ln.qty){ln.lineStatus='calidad';if(worst==='total'||worst==='parcial')worst='calidad'}
    else{ln.lineStatus='parcial';if(worst==='total')worst='parcial'}
  });
  return worst;
},
checkOrdersStock:function(){
  var self=this;var results=[];
  this.state.orders.forEach(function(o){
    if(o.status==='Facturado'||o.status==='Expedido')return;
    var oldStatus=o.stockStatus;
    o.stockStatus=self.calcOrderStockStatus(o);
    if(o.stockStatus==='parcial'&&(o.status==='Pendiente'||o.status==='Stock revisado'))o.status='Parcial';
    if(o.stockStatus==='sin_stock'&&(o.status==='Pendiente'||o.status==='Stock revisado'))o.status='Sin stock';
    if(o.stockStatus==='calidad'&&(o.status==='Pendiente'||o.status==='Stock revisado'))o.status='Espera calidad';
    if(o.stockStatus==='total'&&(o.status==='Parcial'||o.status==='Sin stock'||o.status==='Espera calidad'))o.status='Stock revisado';
    if(oldStatus!==o.stockStatus)results.push({order:o.orderNumber,client:o.client,oldS:oldStatus,newS:o.stockStatus,lines:o.lines||[]});
  });
  if(results.length){this.markChanged();this.updateBadges();this.showStockCheckReport(results)}
},
showStockCheckReport:function(results){
  var self=this;var html='<div class="p-5 max-h-[60vh] overflow-y-auto"><div class="ab as mb-3"><i class="fas fa-check-circle mt-0.5"></i><strong>Stock verificado para '+results.length+' pedidos</strong></div>';
  results.forEach(function(r){
    var icon=r.newS==='total'?'fa-check-circle text-emerald-500':r.newS==='parcial'?'fa-exclamation-circle text-amber-500':r.newS==='sin_stock'?'fa-times-circle text-rose-500':'fa-flask text-sky-500';
    html+='<div class="p-3 rounded-xl border border-slate-200 dark:border-slate-600 mb-2"><div class="flex items-center gap-2 mb-1"><i class="fas '+icon+'"></i><span class="font-bold text-sm">'+r.order+' - '+r.client+'</span></div>';
    if(r.lines&&r.lines.length){r.lines.forEach(function(ln){
      var lnIcon=ln.lineStatus==='total'?'🟢':ln.lineStatus==='parcial'?'🟡':ln.lineStatus==='sin_stock'?'🔴':'🔵';
      html+='<div class="text-[11px] ml-6 mb-0.5">'+lnIcon+' <strong>'+self.esc(ln.ref)+'</strong> '+self.esc((ln.product||'').substring(0,30))+' - Pedir: '+ln.qty+' | General: '+ln.stockGeneral+' | Calidad: '+ln.stockCalidad+' | Playa: '+ln.stockPlaya;
      if(ln.lineStatus==='calidad')html+=' <span class="text-sky-600 font-bold">→ LIBERAR</span>';
      html+='</div>'});
    }
    html+='</div>';
  });
  html+='</div>';
  this.showModal('Informe Stock vs Pedidos',html);
},

  O.filter(function(o){return(o.stockStatus==='calidad')&&o.status!=='Facturado'&&o.status!=='Expedido'}).forEach(function(o){tasks.push({id:'liberar-'+o.id,type:'calidad',priority:'alta',text:'LIBERAR CALIDAD: '+o.orderNumber,done:false,auto:true,color:'#0ea5e9',icon:'fa-flask',orderId:o.id})});
  O.filter(function(o){return o.status==='Espera cliente'}).forEach(function(o){tasks.push({id:'wait-'+o.id,type:'espera',priority:'alta',text:'ESPERANDO RESP: '+o.orderNumber+' ('+o.client+')',done:false,auto:true,color:'#a855f7',icon:'fa-hourglass-half',orderId:o.id})});
  O.filter(function(o){return o.status==='Picking realizado'}).forEach(function(o){tasks.push({id:'pack-'+o.id,type:'packing',priority:'media',text:'Packing: '+o.orderNumber,done:false,auto:true,color:'#14b8a6',icon:'fa-box-open',orderId:o.id})});
  O.filter(function(o){return o.status==='Facturacion pendiente'}).forEach(function(o){tasks.push({id:'fact-'+o.id,type:'factura',priority:'media',text:'Facturar: '+o.orderNumber,done:false,auto:true,color:'#eab308',icon:'fa-file-invoice',orderId:o.id})});

renderCalendar:function(){

filterProductList:function(oid){
  var inp=document.getElementById('line-search');var list=document.getElementById('line-search-list');if(!inp||!list)return;
  var q=inp.value.trim().toLowerCase();var self=this;

  var arr=Object.values(prods);

  list.classList.add('open');
},
getProductLots:function(productCode){
  var lotMap={};
  this.state.stockData.forEach(function(s){
    if(s.productCode!==productCode)return;
    var lot=s.lotCode||s.lot||'';var loc=s.locationCode||s.location||'';
    var key=lot+'||'+loc;
    if(!lotMap[key])lotMap[key]={lot:lot,location:loc,stock:0,expiry:s.expiry||s.caducidad||''};
    lotMap[key].stock+=s.stock;
  });
  var arr=Object.values(lotMap).filter(function(l){return l.stock>0});
  /* Sort oldest lot first (by lot code alphanumerically as proxy for age) */
  arr.sort(function(a,b){return(a.lot||'').localeCompare(b.lot||'')});
  return arr;
},
validateLotLoc:function(oid,lot,location,productCode){
  if(!lot||!location)return[];
  var issues=[];var o=this.state.orders.find(function(x){return x.id===oid});if(!o)return[];
  var orderDate=o.date;var cfg=this.CC[o.client]||{};var isMerc=cfg.type==='mercadona';
  var tempSubs=this.state._tempSublots||[];
  var dupsInTemp=tempSubs.filter(function(sl){return sl.lot===lot&&sl.location===location}).length;
  if(dupsInTemp>0)issues.push('Lote+Ubicacion ya añadido en esta linea');
  if(o.lines){o.lines.forEach(function(ln){
    var subs=ln.sublots||[{lot:ln.lot||'',location:ln.location||'',qty:ln.qty}];
    subs.forEach(function(sl){if(sl.lot===lot&&sl.location===location)issues.push('Ya usado en linea '+ln.ref+' de este pedido')});
  })}
  var self=this;
  this.state.orders.forEach(function(other){
    if(other.id===oid||other.date!==orderDate)return;
    if(other.status==='Facturado'||other.status==='Expedido')return;
    if(!isMerc&&!(self.CC[other.client]||{}).type)return;
    if(!other.lines)return;
    other.lines.forEach(function(ln){
      if(ln.ref!==productCode)return;
      var subs=ln.sublots||[{lot:ln.lot||'',location:ln.location||'',qty:ln.qty}];
      subs.forEach(function(sl){if(sl.lot===lot&&sl.location===location)issues.push('Usado en pedido '+other.orderNumber+' ('+other.client+') mismo dia')});
    });
  });
  return issues;
},

    var usedByLotLoc={};subs.forEach(function(s){var k=s.lot+'||'+s.location;usedByLotLoc[k]=(usedByLotLoc[k]||0)+s.qty});
    locOpts=locsForLot.map(function(l){var used=usedByLotLoc[l.lot+'||'+l.location]||0;var free=l.stock-used;if(free<=0)return'';return'<option value="'+self.escA(l.location)+'">'+self.esc(l.location)+' (disp: '+free+')</option>'}).join('')}
  /* If NOT full rebuild, try to update only the sublot zone */

      subsHtml+
      (remainQty>0?'<div class="grid grid-cols-2 gap-2 mt-2"><div><label class="text-[10px] font-bold text-slate-400 block mb-0.5">Lote (mas antiguo primero)</label><select class="fi text-sm !min-h-[38px]" id="sl-lot" onchange="App._updateLotSection()"><option value="">Seleccionar lote</option>'+lotOpts+'</select></div><div><label class="text-[10px] font-bold text-slate-400 block mb-0.5">Caducidad</label><input type="text" class="fi text-sm !min-h-[38px]" id="sl-expiry" placeholder="dd/mm/aaaa"'+(curLot&&uniqueLots[curLot]&&uniqueLots[curLot].expiry?' value="'+self.escA(uniqueLots[curLot].expiry)+'"':'')+'></div><div><label class="text-[10px] font-bold text-slate-400 block mb-0.5">Ubicacion</label><select class="fi text-sm !min-h-[38px]" id="sl-loc"><option value="">Seleccionar</option>'+locOpts+'</select></div><div><label class="text-[10px] font-bold text-slate-400 block mb-0.5">Cantidad</label><div class="flex gap-1"><input type="number" class="fi text-sm !min-h-[38px]" id="sl-qty" min="1"'+(remainQty>0?' value="'+remainQty+'"':'')+'><button class="btn btn-p btn-sm" onclick="App.addTempSublot()" title="Añadir lote"><i class="fas fa-plus"></i></button></div></div></div>':'')
    }

  '<div class="mb-3"><label class="text-[10px] font-bold text-slate-500 uppercase block mb-0.5">Cantidad Total Pedida*</label><input type="number" class="fi" id="al-qty" min="1" value="'+(totalQty||'')+'" placeholder="Unidades que pide el cliente" oninput="App._renderLineModal()"></div>'+

  subsHtml+

_updateLotSection:function(){
  var selLot=document.getElementById('sl-lot');

},
addTempSublot:function(){
  var lotEl=document.getElementById('sl-lot');var locEl=document.getElementById('sl-loc');var qtyEl=document.getElementById('sl-qty');var expEl=document.getElementById('sl-expiry');
  if(!lotEl||!lotEl.value){this.showToast('Selecciona un lote','error');return}
  if(!locEl||!locEl.value){this.showToast('Selecciona una ubicacion','error');return}
  var qty=parseInt(qtyEl.value);if(!qty||qty<=0){this.showToast('Cantidad obligatoria','error');return}
  var lot=lotEl.value;var loc=locEl.value;var expiry=expEl?expEl.value:'';
  var avail=this.state._tempAvailLots||[];var match=avail.find(function(l){return l.lot===lot&&l.location===loc});
  var usedQty=(this.state._tempSublots||[]).filter(function(s){return s.lot===lot&&s.location===loc}).reduce(function(a,s){return a+s.qty},0);
  var free=match?(match.stock-usedQty):0;
  if(qty>free){this.showToast('Solo hay '+free+' uds disponibles en ese lote+ubicacion','error');return}
  var issues=this.validateLotLoc(this.state._tempOID,lot,loc,this.state._tempPC);
  if(issues.length){this.showToast(issues[0],'error');return}
  this.state._tempSublots.push({lot:lot,location:loc,qty:qty,expiry:expiry});
  this.state._tempCurLot='';
  this._renderLineModal(true);
},
removeTempSublot:function(idx){this.state._tempSublots.splice(idx,1);this._renderLineModal(true)},
saveOrderLine:function(oid,productCode){
  var qty=parseInt(document.getElementById('al-qty').value);if(!qty||qty<=0){this.showToast('Cantidad obligatoria','error');return}
  var subs=this.state._tempSublots||[];
  var pName=this.state._tempPN||'';
  var o=this.state.orders.find(function(x){return x.id===oid});if(!o)return;
  var cfg=this.CC[o.client]||{};var isMerc=cfg.type==='mercadona';
  if(isMerc&&subs.length===0){this.showToast('Mercadona requiere asignar lotes y ubicaciones','error');return}
  var assignedQty=subs.reduce(function(a,s){return a+s.qty},0);

genDailyPDF:function(){

  var jsPDF=window.jspdf.jsPDF;var doc=new jsPDF();var O=this.state.orders;var L=this.state.loads;var I=this.state.incidents;var today=this.fd(new Date());var self=this;var pg={v:1};

  var todayO=O.filter(function(o){return o.date===today});
  var pend=O.filter(function(o){return['Pendiente','Parcial','Sin stock','Espera calidad','Espera cliente','Negociando','Stock revisado','Picking realizado','Packing listo','Etiquetas impresas','Pendiente recogida'].indexOf(o.status)!==-1});

  var aucO=O.filter(function(o){var cc=self.CC[o.client];return cc&&cc.type==='auchan'&&o.status!=='Facturado'&&o.status!=='Expedido'});
  var tercO=O.filter(function(o){var cc=self.CC[o.client];return cc&&cc.type==='tercero'&&o.status!=='Facturado'&&o.status!=='Expedido'});
  var sinStock=O.filter(function(o){return o.stockStatus==='sin_stock'&&o.status!=='Facturado'&&o.status!=='Expedido'});

  var msi=this.getMercScheduleInfo();
  /* 1. KPIs */
  y=this._pdfKpiRow(doc,y,[{l:'Creados Hoy',v:todayO.length,c:[13,148,136]},{l:'Activos',v:pend.length,c:[245,158,11]},{l:'Completados',v:exp.length,c:[34,197,94]},{l:'Incidencias',v:openInc.length,c:[239,68,68]}]);

  /* 2. RESUMEN EJECUTIVO ESCRITO */
  y+=2;
  y=this._pdfSection(doc,y,'RESUMEN EJECUTIVO',[30,41,59]);
  var dayNames=['domingo','lunes','martes','miercoles','jueves','viernes','sabado'];
  var dow=new Date().getDay();
  var resumen='Jornada del '+dateStr+'. ';
  if(todayO.length>0)resumen+='Se han registrado '+todayO.length+' nuevo'+(todayO.length>1?'s':'')+' pedido'+(todayO.length>1?'s':'')+' durante la sesion. ';
  else resumen+='No se han recibido pedidos nuevos en la jornada actual. ';
